<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Получение токена VK</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        textarea { width: 100%; height: 100px; margin: 10px 0; }
        button { padding: 8px 16px; font-size: 16px; }
        .note { font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <h2>🔑 Получение токена VK</h2>
    <p>Нажмите кнопку, чтобы авторизоваться и разрешить доступ.</p>
    <button id="getToken">Получить токен</button>
    <div id="result" style="margin-top: 20px; display: none;">
        <h3>Ваш токен:</h3>
        <textarea id="tokenArea" readonly></textarea>
        <p class="note">Скопируйте этот токен и вставьте в поле <strong>User Token</strong> в настройках бота.</p>
    </div>

    <script>
        const clientId = 'ВАШ_ID_ПРИЛОЖЕНИЯ'; // Замените на ID вашего приложения
        const redirectUri = encodeURIComponent(window.location.href.split('?')[0]); // //текущий URL
        const scope = 'messages,docs,wall,groups,offline'; // нужные права

        // Если в URL есть токен
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        if (params.has('access_token')) {
            const token = params.get('access_token');
            document.getElementById('tokenArea').value = token;
            document.getElementById('result').style.display = 'block';
            // Очищаем URL от токена для безопасности
            history.replaceState(null, null, window.location.pathname);
        }

        document.getElementById('getToken').onclick = () => {
            const authUrl = `https://oauth.vk.com/authorize?client_id=${54502557}&display=page&redirect_uri=${redirectUri}&scope=${scope}&response_type=token&v=5.199`;
            window.location.href = authUrl;
        };
    </script>
</body>
</html>
